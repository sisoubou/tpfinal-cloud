name: Build and Deploy to Azure

on:
  push: 
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
 build:
  runs-on: ubuntu-latest

  steps:
  - name: Checkout code
    uses: actions/checkout@v3
      
  - name: Login to Docker Hub
    uses: docker/login-action@v2
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      token: ${{ secrets.DOCKER_TOKEN }}

  - name: Build Docker image
    run: |
      docker build\ --build-arg BUILD_ID=${{ github.sha }}\ -t ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}\-t ${{ secrets.DOCKER_USERNAME }}/vue-app:$latest .

  - name: Push Docker image
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}
      docker push ${{ secrets.DOCKER_USERNAME }}/vue-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: serena-exam-app-container
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}
